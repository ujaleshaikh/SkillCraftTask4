<!DOCTYPE html>
<html>
<head>
    <title>Keylogger Demo (Educational)</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        textarea {
            width: 80%;
            height: 100px;
            font-size: 16px;
        }
        #log {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            height: 200px;
            overflow-y: scroll;
            text-align: left;
        }
    </style>
</head>
<body>

    <h2>⚠️ Educational Keylogger (Browser Only)</h2>
    <p>Type inside the box below:</p>

    <textarea id="inputBox" placeholder="Start typing..."></textarea>

    <div id="log"></div>

    <script>
        const inputBox = document.getElementById("inputBox");
        const logDiv = document.getElementById("log");

        inputBox.addEventListener("keydown", function(event) {
            let time = new Date().toLocaleString();
            let key = event.key;

            let logEntry;

            if (key.length === 1) {
                logEntry = `[${time}] KEY: ${key}`;
            } else {
                logEntry = `[${time}] SPECIAL KEY: ${key}`;
            }

            let p = document.createElement("p");
            p.textContent = logEntry;
            logDiv.appendChild(p);

            logDiv.scrollTop = logDiv.scrollHeight;
        });
    </script>

</body>
</html>
